<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etiquetas de Pendência - Azul Cargo</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,Helvetica,sans-serif;
  background:#f4f6f8;
  color:#002b55;
}
.topbar{
  height:18px;
  background:#003f7f;
}
.container{
  display:grid;
  grid-template-columns:360px 1fr;
  gap:30px;
  padding:32px 54px;
}
.panel{
  background:white;
  border:2px solid #00427f;
  border-radius:10px;
  padding:26px;
}
h2{
  font-size:22px;
  margin-bottom:28px;
  color:#003f7f;
}
label{
  display:block;
  font-weight:bold;
  margin:18px 0 8px;
  font-size:15px;
}
input,select,textarea{
  width:100%;
  border:2px solid #cfd6df;
  border-radius:5px;
  padding:12px;
  font-size:15px;
}
textarea{
  min-height:80px;
  resize:vertical;
}
button{
  border:none;
  border-radius:5px;
  padding:13px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  font-size:15px;
}
.btn-blue{background:#00427f}
.btn-green{background:#28a745}
.btn-purple{background:#a100ff}
.btn-red{background:#ff2d35}
.btn-lightblue{background:#267dff}
.btn-orange{background:#ff8a00}
.actions{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:28px;
}
.cards{
  display:flex;
  flex-wrap:wrap;
  gap:22px;
  align-items:flex-start;
}
.card{
  width:395px;
  background:white;
  border:1.8px solid #00427f;
  border-radius:10px;
  padding:28px 24px 24px;
  position:relative;
  box-shadow:0 2px 5px rgba(0,0,0,.08);
}
.logo{
  text-align:center;
  font-size:12px;
  font-weight:bold;
  margin-bottom:18px;
}
.logo span{
  color:#0070c9;
}
.close{
  position:absolute;
  right:12px;
  top:10px;
  background:#ff2d35;
  width:24px;
  height:24px;
  border-radius:50%;
  line-height:24px;
  text-align:center;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
.barcode{
  text-align:center;
  margin-bottom:24px;
}
.card label{
  margin-top:16px;
  font-size:15px;
}
.awb{
  font-size:74px;
  font-weight:bold;
  color:#00427f;
  text-align:center;
  letter-spacing:2px;
  margin:28px 0;
}
.card-buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.footer-actions{
  display:flex;
  gap:12px;
  margin-top:20px;
}
.empty{
  color:#607080;
  font-size:16px;
  padding:30px;
}
@media print{
  body{background:white}
  .topbar,.panel,.footer-actions{display:none!important}
  .container{
    display:block;
    padding:0;
  }
  .cards{
    display:flex;
    flex-wrap:wrap;
    gap:0;
  }
  .card{
    width:10cm;
    height:15cm;
    border:1.5px solid #000;
    border-radius:0;
    box-shadow:none;
    page-break-inside:avoid;
    margin:0;
  }
  .close,.card-buttons{
    display:none!important;
  }
}
@media(max-width:900px){
  .container{
    grid-template-columns:1fr;
    padding:20px;
  }
  .card{
    width:100%;
  }
  .awb{
    font-size:54px;
  }
}
</style>
</head>

<body>
<div class="topbar"></div>

<div class="container">

  <div class="panel">
    <h2>Entrada de Dados</h2>

    <div class="actions">
      <button class="btn-blue" onclick="alert('Use o campo AWB para colar ou digitar o código.')">📁 Galeria</button>
      <button class="btn-green" onclick="alert('Leitura por câmera pode ser adicionada depois.')">📷 Câmera</button>
      <button class="btn-purple" onclick="focarAWB()">▣ Ler Código de Barras</button>
    </div>

    <label>Código AWB</label>
    <input id="awb" placeholder="Cole ou digite o AWB" maxlength="15">

    <button class="btn-lightblue" style="width:100%;margin-top:10px" onclick="adicionarEtiqueta()">Adicionar AWB</button>

    <label>SLA - Data de Vencimento</label>
    <input id="sla" placeholder="Ex: 15/04/2026">

    <label>Status da Carga</label>
    <select id="status">
      <option value="">SELECIONE O MOTIVO</option>
      <option>PENDÊNCIA DE ENDEREÇO</option>
      <option>DESTINATÁRIO AUSENTE</option>
      <option>RECUSA NO RECEBIMENTO</option>
      <option>AVARIA</option>
      <option>EXTRAVIO EM ANÁLISE</option>
      <option>AGUARDANDO RETIRADA</option>
      <option>REENTREGA PROGRAMADA</option>
      <option>TRATATIVA COMERCIAL</option>
    </select>

    <label>Informações adicionais</label>
    <textarea id="info" placeholder="Digite aqui"></textarea>

    <div class="footer-actions">
      <button class="btn-orange" onclick="imprimirTodas()">🖨️ Imprimir Todas</button>
      <button class="btn-red" onclick="limparTudo()">🗑️ Limpar Lote</button>
    </div>
  </div>

  <div>
    <div id="lista" class="cards">
      <div class="empty">Nenhuma etiqueta gerada ainda.</div>
    </div>
  </div>

</div>

<script>
let etiquetas = JSON.parse(localStorage.getItem('etiquetasPendencia') || '[]');

function salvar(){
  localStorage.setItem('etiquetasPendencia', JSON.stringify(etiquetas));
}

function focarAWB(){
  document.getElementById('awb').focus();
}

function adicionarEtiqueta(){
  const awb = document.getElementById('awb').value.trim();
  const sla = document.getElementById('sla').value.trim();
  const status = document.getElementById('status').value.trim();
  const info = document.getElementById('info').value.trim();

  if(!awb){
    alert('Informe o AWB.');
    return;
  }

  etiquetas.push({
    id: Date.now(),
    awb,
    sla,
    status,
    info
  });

  document.getElementById('awb').value = '';
  salvar();
  renderizar();
}

function excluirEtiqueta(id){
  etiquetas = etiquetas.filter(e => e.id !== id);
  salvar();
  renderizar();
}

function atualizarEtiqueta(id){
  const card = document.querySelector(`[data-id="${id}"]`);
  const status = card.querySelector('.status-card').value;
  const sla = card.querySelector('.sla-card').value;
  const info = card.querySelector('.info-card').value;

  etiquetas = etiquetas.map(e => {
    if(e.id === id){
      e.status = status;
      e.sla = sla;
      e.info = info;
    }
    return e;
  });

  salvar();
  alert('Etiqueta atualizada.');
}

function renderizar(){
  const lista = document.getElementById('lista');
  lista.innerHTML = '';

  if(etiquetas.length === 0){
    lista.innerHTML = '<div class="empty">Nenhuma etiqueta gerada ainda.</div>';
    return;
  }

  etiquetas.forEach(e => {
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-id', e.id);

    card.innerHTML = `
      <div class="close" onclick="excluirEtiqueta(${e.id})">×</div>

      <div class="logo">
        <span>Azul</span> Express
      </div>

      <div class="barcode">
        <svg id="barcode-${e.id}"></svg>
      </div>

      <label>Status da Carga</label>
      <select class="status-card">
        ${opcoesStatus(e.status)}
      </select>

      <label>SLA</label>
      <input class="sla-card" value="${escapeHtml(e.sla || '')}" placeholder="Adicionar SLA">

      <label>Informações adicionais</label>
      <textarea class="info-card" placeholder="Digite aqui">${escapeHtml(e.info || '')}</textarea>

      <div class="awb">${escapeHtml(e.awb)}</div>

      <div class="card-buttons">
        <button class="btn-lightblue" onclick="atualizarEtiqueta(${e.id})">🔄 Atualizar</button>
        <button class="btn-red" onclick="excluirEtiqueta(${e.id})">🗑️ Deletar</button>
      </div>
    `;

    lista.appendChild(card);

    JsBarcode(`#barcode-${e.id}`, e.awb, {
      format: "CODE128",
      width: 2,
      height: 55,
      displayValue: false,
      margin: 0
    });
  });
}

function opcoesStatus(valor){
  const ops = [
    '',
    'PENDÊNCIA DE ENDEREÇO',
    'DESTINATÁRIO AUSENTE',
    'RECUSA NO RECEBIMENTO',
    'AVARIA',
    'EXTRAVIO EM ANÁLISE',
    'AGUARDANDO RETIRADA',
    'REENTREGA PROGRAMADA',
    'TRATATIVA COMERCIAL'
  ];

  return ops.map(o => {
    const txt = o || 'SELECIONE O MOTIVO';
    return `<option value="${o}" ${o === valor ? 'selected' : ''}>${txt}</option>`;
  }).join('');
}

function imprimirTodas(){
  if(etiquetas.length === 0){
    alert('Nenhuma etiqueta para imprimir.');
    return;
  }
  window.print();
}

function limparTudo(){
  if(!confirm('Deseja apagar todas as etiquetas geradas?')) return;
  etiquetas = [];
  salvar();
  renderizar();
}

function escapeHtml(texto){
  return String(texto)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#039;');
}

document.getElementById('awb').addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    adicionarEtiqueta();
  }
});

renderizar();
</script>

</body>
</html>
