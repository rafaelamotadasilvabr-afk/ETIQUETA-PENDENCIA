<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etiquetas de Pendência - Azul Cargo</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;color:#003b73}
.topbar{height:18px;background:#003f7f}
.container{display:grid;grid-template-columns:380px 1fr;gap:28px;padding:32px 56px}
.panel{background:#fff;border:2px solid #00427f;border-radius:10px;padding:24px}
h2{font-size:22px;margin-bottom:22px;color:#003f7f}
label{display:block;font-weight:bold;margin:16px 0 7px;font-size:14px}
input,select,textarea{width:100%;border:2px solid #ccd4dd;border-radius:5px;padding:11px;font-size:15px}
textarea{min-height:92px;resize:vertical}
button{border:none;border-radius:5px;padding:12px;font-weight:bold;cursor:pointer;color:#fff;font-size:14px}
.btn-blue{background:#00427f}.btn-green{background:#28a745}.btn-purple{background:#a100ff}
.btn-red{background:#ff2d35}.btn-lightblue{background:#267dff}.btn-orange{background:#ff8a00}
.btn-gray{background:#607080}
.actions{display:flex;flex-direction:column;gap:12px;margin-bottom:22px}
.footer-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.cards{display:flex;flex-wrap:wrap;gap:22px;align-items:flex-start}
.card{width:395px;background:#fff;border:1.8px solid #00427f;border-radius:10px;padding:28px 24px 24px;position:relative;box-shadow:0 2px 5px rgba(0,0,0,.08)}
.logo{text-align:center;font-size:12px;font-weight:bold;margin-bottom:18px}.logo span{color:#0070c9}
.close{position:absolute;right:12px;top:10px;background:#ff2d35;width:24px;height:24px;border-radius:50%;line-height:24px;text-align:center;color:#fff;font-weight:bold;cursor:pointer}
.barcode{text-align:center;margin-bottom:22px}
.awb{font-size:72px;font-weight:bold;color:#00427f;text-align:center;letter-spacing:2px;margin:26px 0}
.card-buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.empty{color:#607080;font-size:16px;padding:30px}
.help{font-size:12px;color:#607080;line-height:1.4;margin-top:6px}
.count{font-weight:bold;margin-bottom:14px;color:#003f7f}

@media print{
  body{background:#fff}
  .topbar,.panel,.footer-actions,.count{display:none!important}
  .container{display:block;padding:0}
  .cards{display:flex;flex-wrap:wrap;gap:0}
  .card{width:10cm;height:15cm;border:1.5px solid #000;border-radius:0;box-shadow:none;page-break-inside:avoid;margin:0}
  .close,.card-buttons{display:none!important}
}

@media(max-width:900px){
  .container{grid-template-columns:1fr;padding:20px}
  .card{width:100%}
  .awb{font-size:54px}
}
</style>
</head>

<body>
<div class="topbar"></div>

<div class="container">

  <div class="panel">
    <h2>Entrada de Dados</h2>

    <div class="actions">
      <button class="btn-blue" onclick="alert('Use o campo AWB ou cole o lote abaixo.')">📁 Galeria</button>
      <button class="btn-green" onclick="alert('Câmera pode ser adicionada depois.')">📷 Câmera</button>
      <button class="btn-purple" onclick="focarAWB()">▣ Ler Código de Barras</button>
    </div>

    <label>Código AWB</label>
    <input id="awb" placeholder="Cole ou digite o AWB" maxlength="15">

    <label>Status da Carga</label>
    <select id="status"></select>

    <label>SLA - Data de Vencimento</label>
    <input id="sla" placeholder="Ex: 24/06/2026">

    <label>Informações adicionais</label>
    <textarea id="info" placeholder="Digite aqui"></textarea>

    <button class="btn-lightblue" style="width:100%;margin-top:10px" onclick="adicionarEtiqueta()">Adicionar AWB</button>

    <label>Importar lote</label>
    <textarea id="lote" placeholder="Ex:
25285562 - endereço n localizado -24/06/2026
13239214 - devolução - 21/06/2026"></textarea>
    <div class="help">Formato aceito: AWB - motivo - SLA</div>

    <div class="footer-actions">
      <button class="btn-blue" onclick="importarLote()">📥 Importar Lote</button>
      <button class="btn-orange" onclick="imprimirTodas()">🖨️ Imprimir Todas</button>
      <button class="btn-red" onclick="limparTudo()">🗑️ Limpar Lote</button>
    </div>
  </div>

  <div>
    <div class="count" id="contador">0 etiquetas geradas</div>
    <div id="lista" class="cards">
      <div class="empty">Nenhuma etiqueta gerada ainda.</div>
    </div>
  </div>

</div>

<script>
const motivos = [
  "AUSENTE + DE 3 VEZES",
  "ENDERECO NAO LOCALIZADO",
  "CLIENTE DESCONHECIDO",
  "CLIENTE MUDOU-SE",
  "CEP ERRADO",
  "ETIQUETAS DIVERGENTES",
  "RECUSADO",
  "BAIXA ERRONEA",
  "CTE CANCELADO",
  "AVARIA",
  "FALTA VOLUME",
  "TROCA DE OFFLOAD",
  "DEVOLUCAO",
  "REENTREGA",
  "DUPLICIDADE"
];

let etiquetas = JSON.parse(localStorage.getItem('etiquetasPendencia') || '[]');

function salvar(){
  localStorage.setItem('etiquetasPendencia', JSON.stringify(etiquetas));
}

function carregarMotivos(){
  const selects = [document.getElementById('status')];
  selects.forEach(sel => {
    sel.innerHTML = '<option value="">SELECIONE O MOTIVO</option>';
    motivos.forEach(m => {
      sel.innerHTML += `<option value="${m}">${m}</option>`;
    });
  });
}

function focarAWB(){
  document.getElementById('awb').focus();
}

function normalizarTexto(txt){
  return String(txt || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .toUpperCase()
    .replace(/\s+/g,' ')
    .trim();
}

function normalizarMotivo(motivo){
  const m = normalizarTexto(motivo);

  if(m.includes('AUSENTE')) return 'AUSENTE + DE 3 VEZES';
  if(m.includes('ENDERECO') && (m.includes('NAO') || m.includes('N ')) && m.includes('LOCALIZADO')) return 'ENDERECO NAO LOCALIZADO';
  if(m.includes('DESCONHECIDO')) return 'CLIENTE DESCONHECIDO';
  if(m.includes('MUDOU')) return 'CLIENTE MUDOU-SE';
  if(m.includes('CEP')) return 'CEP ERRADO';
  if(m.includes('DIVERGENTE')) return 'ETIQUETAS DIVERGENTES';
  if(m.includes('RECUS')) return 'RECUSADO';
  if(m.includes('BAIXA')) return 'BAIXA ERRONEA';
  if(m.includes('CTE')) return 'CTE CANCELADO';
  if(m.includes('AVARIA')) return 'AVARIA';
  if(m.includes('FALTA')) return 'FALTA VOLUME';
  if(m.includes('OFFLOAD')) return 'TROCA DE OFFLOAD';
  if(m.includes('DEVOL')) return 'DEVOLUCAO';
  if(m.includes('REENTREGA')) return 'REENTREGA';
  if(m.includes('DUPLIC')) return 'DUPLICIDADE';

  return motivo ? normalizarTexto(motivo) : '';
}

function adicionarEtiqueta(){
  const awb = document.getElementById('awb').value.trim();
  const sla = document.getElementById('sla').value.trim();
  const status = document.getElementById('status').value.trim();
  const info = document.getElementById('info').value.trim();

  if(!awb){
    alert('Informe o AWB.');
    return;
  }

  etiquetas.push({
    id: Date.now() + Math.random(),
    awb,
    sla,
    status,
    info
  });

  document.getElementById('awb').value = '';
  salvar();
  renderizar();
}

function importarLote(){
  const texto = document.getElementById('lote').value.trim();
  if(!texto){
    alert('Cole as informações do lote.');
    return;
  }

  const linhas = texto.split(/\n+/);
  let adicionadas = 0;

  linhas.forEach(linha => {
    const partes = linha.split('-').map(p => p.trim()).filter(Boolean);

    if(partes.length >= 3){
      const awb = partes[0];
      const sla = partes[partes.length - 1];
      const motivo = partes.slice(1, partes.length - 1).join(' - ');

      etiquetas.push({
        id: Date.now() + Math.random(),
        awb,
        status: normalizarMotivo(motivo),
        sla,
        info: ''
      });

      adicionadas++;
    }
  });

  salvar();
  renderizar();
  alert(adicionadas + ' etiquetas importadas.');
}

function excluirEtiqueta(id){
  etiquetas = etiquetas.filter(e => e.id !== id);
  salvar();
  renderizar();
}

function atualizarEtiqueta(id){
  const card = document.querySelector(`[data-id="${id}"]`);
  const status = card.querySelector('.status-card').value;
  const sla = card.querySelector('.sla-card').value;
  const info = card.querySelector('.info-card').value;

  etiquetas = etiquetas.map(e => {
    if(String(e.id) === String(id)){
      e.status = status;
      e.sla = sla;
      e.info = info;
    }
    return e;
  });

  salvar();
  alert('Etiqueta atualizada.');
}

function renderizar(){
  const lista = document.getElementById('lista');
  const contador = document.getElementById('contador');

  contador.textContent = etiquetas.length + ' etiquetas geradas';
  lista.innerHTML = '';

  if(etiquetas.length === 0){
    lista.innerHTML = '<div class="empty">Nenhuma etiqueta gerada ainda.</div>';
    return;
  }

  etiquetas.forEach(e => {
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-id', e.id);

    card.innerHTML = `
      <div class="close" onclick="excluirEtiqueta('${e.id}')">×</div>

      <div class="logo"><span>Azul</span> Express</div>

      <div class="barcode">
        <svg id="barcode-${String(e.id).replace('.','')}"></svg>
      </div>

      <label>Status da Carga</label>
      <select class="status-card">
        ${opcoesStatus(e.status)}
      </select>

      <label>SLA</label>
      <input class="sla-card" value="${escapeHtml(e.sla || '')}" placeholder="Adicionar SLA">

      <label>Informações adicionais</label>
      <textarea class="info-card" placeholder="Digite aqui">${escapeHtml(e.info || '')}</textarea>

      <div class="awb">${escapeHtml(e.awb)}</div>

      <div class="card-buttons">
        <button class="btn-lightblue" onclick="atualizarEtiqueta('${e.id}')">🔄 Atualizar</button>
        <button class="btn-red" onclick="excluirEtiqueta('${e.id}')">🗑️ Deletar</button>
      </div>
    `;

    lista.appendChild(card);

    JsBarcode(`#barcode-${String(e.id).replace('.','')}`, e.awb, {
      format: "CODE128",
      width: 2,
      height: 55,
      displayValue: false,
      margin: 0
    });
  });
}

function opcoesStatus(valor){
  let html = '<option value="">SELECIONE O MOTIVO</option>';
  motivos.forEach(m => {
    html += `<option value="${m}" ${m === valor ? 'selected' : ''}>${m}</option>`;
  });
  return html;
}

function imprimirTodas(){
  if(etiquetas.length === 0){
    alert('Nenhuma etiqueta para imprimir.');
    return;
  }
  window.print();
}

function limparTudo(){
  if(!confirm('Deseja apagar todas as etiquetas geradas?')) return;
  etiquetas = [];
  salvar();
  renderizar();
}

function escapeHtml(texto){
  return String(texto)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}

document.getElementById('awb').addEventListener('keydown', function(e){
  if(e.key === 'Enter') adicionarEtiqueta();
});

carregarMotivos();
renderizar();
</script>

</body>
</html>
